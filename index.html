<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="EduFaso — système de gestion scolaire" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>EduFaso</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("edufaso-theme");
          if (t === "dark") document.documentElement.classList.add("dark");
          else document.documentElement.classList.remove("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div
        id="boot-fallback"
        style="font-family: system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 1.5rem; background: #0f172a; color: #e2e8f0;"
      >
        <img
          src="./edufaso-logo.png"
          alt="EduFaso"
          width="128"
          height="128"
          style="border-radius: 1rem; max-width: 8rem; height: auto;"
        />
        <p style="margin: 0; font-size: 0.95rem;">Chargement d’EduFaso…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
