name: Deploy EduFaso to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Build
        env:
          GITHUB_PAGES: "true"
          VITE_SUPABASE_PROJECT_ID: hbfjtsxzueftoiryzhxh
          VITE_SUPABASE_URL: https://hbfjtsxzueftoiryzhxh.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhiZmp0c3h6dWVmdG9pcnl6aHhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNDk3MzMsImV4cCI6MjA5OTcyNTczM30.73yYUv5M5WpTzxDGm3KcLAtrsUDuv9SzOkYtwfYpfS4
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
